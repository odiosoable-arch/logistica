<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Entregas Cuautitlán</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Asegura que el mapa sea visible y ocupe toda la pantalla */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: calc(100vh - 60px); width: 100%; }
        .header { 
            background: #2c3e50; 
            color: white; 
            padding: 10px; 
            text-align: center; 
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 { margin: 0; font-size: 1.5rem; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="header"><h1>🚚 Panel de Control - Logística</h1></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 1. CONFIGURACIÓN DE TU PROYECTO
        const URL_PROYECTO = 'https://dmmjjcgruacwbmbicbyg.supabase.co';
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtbWpqY2dydWFjd2JtYmljYnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDI2NTYsImV4cCI6MjA5MTcxODY1Nn0.wIMdzc8gEycItKvPGvRmSu90kSsOxviTOgnMNIF4dJs'; // <--- PEGA AQUÍ TU CLAVE ANON PÚBLICA

        // Inicializamos el cliente de Supabase con un nombre único para evitar errores
        const _supabase = supabase.createClient(URL_PROYECTO, ANON_KEY);

        // 2. CONFIGURACIÓN DEL MAPA (Centrado en Cuautitlán)
        var map = L.map('map').setView([19.67, -99.16], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Grupo para los marcadores (facilita limpiarlos antes de actualizar)
        var markersGroup = L.layerGroup().addTo(map);

        // 3. FUNCIÓN PARA CARGAR DATOS DE CLIENTES
        async function cargarClientes() {
            console.log("Actualizando ubicaciones...");
            
            const { data: entregas, error } = await _supabase
                .from('entregas')
                .select('*');

            if (error) {
                console.error('Error al conectar con Supabase:', error.message);
                return;
            }

            // Limpiamos los marcadores actuales antes de poner los nuevos
            markersGroup.clearLayers();

            // Dibujamos los puntos en el mapa
            entregas.forEach(cliente => {
                if (cliente.latitud && cliente.longitud) {
                    L.marker([cliente.latitud, cliente.longitud])
                        .addTo(markersGroup)
                        .bindPopup(`
                            <b>Cliente:</b> ${cliente.Nombre || 'Sin nombre'}<br>
                            <b>Teléfono:</b> ${cliente.telefono || 'Sin datos'}<br>
                            <hr>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${cliente.latitud},${cliente.longitud}" target="_blank">Abrir ruta en Google Maps</a>
                        `);
                }
            });
        }

        // Ejecutar carga inicial
        cargarClientes();

        // Actualización automática cada 30 segundos
        setInterval(cargarClientes, 30000);
    </script>
</body>
</html>
