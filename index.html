<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística - Panel Seguro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background-color: #f4f7f6; }
        #login-screen { max-width: 400px; margin: 80px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; }
        #main-screen { display: none; height: 100%; width: 100%; }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        #map { height: calc(100vh - 65px); width: 100%; }
        #error-msg { color: #e74c3c; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Acceso Logística</h2>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="iniciarSesion()">Entrar</button>
        <p id="error-msg"></p>
    </div>

    <div id="main-screen">
        <div class="header"><h1>Mis Entregas en Tiempo Real</h1></div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const URL_PROYECTO = 'https://dmmjjcgruacwbmbicbyg.supabase.co';
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtbWpqY2dydWFjd2JtYmljYnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDI2NTYsImV4cCI6MjA5MTcxODY1Nn0.wIMdzc8gEycItKvPGvRmSu90kSsOxviTOgnMNIF4dJs'; // <--- VERIFICA QUE SEA LA CORRECTA
        const _supabase = supabase.createClient(URL_PROYECTO, ANON_KEY);

        let map, markersGroup;

        async function iniciarSesion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                document.getElementById('error-msg').innerText = error.message;
                document.getElementById('error-msg').style.display = 'block';
            } else {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'block';
                inicializarMapa();
                // Usamos el ID del usuario que acaba de loguearse
                cargarClientes(data.user.id);
                setInterval(() => cargarClientes(data.user.id), 20000);
            }
        }

        function inicializarMapa() {
            if (!map) {
                map = L.map('map').setView([19.67, -99.16], 12);
                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                markersGroup = L.layerGroup().addTo(map);
            }
        }

        async function cargarClientes(uid) {
            console.log("Buscando puntos para ID:", uid);
            const { data, error } = await _supabase
                .from('entregas')
                .select('*')
                .eq('repartidor_id', uid);

            if (error) { console.error(error); return; }

            markersGroup.clearLayers();
            data.forEach(p => {
                if (p.latitud && p.longitud) {
                    L.marker([p.latitud, p.longitud]).addTo(markersGroup)
                        .bindPopup(`<b>${p.Nombre}</b><br>Tel: ${p.telefono}<br><a href="https://www.google.com/maps/dir/?api=1&destination=${p.latitud},${p.longitud}" target="_blank">Trazar Ruta</a>`);
                }
            });
        }
    </script>
</body>
</html>
