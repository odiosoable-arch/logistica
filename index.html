<!DOCTYPE html>
<html>
<head>
    <title>Control de Entregas Cuautitlán</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; }
        body { font-family: sans-serif; margin: 0; }
        .header { background: #2c3e50; color: white; padding: 1rem; text-align: center; }
    </style>
</head>
<body>
    <div class="header"><h1>🚚 Panel de Control - Carlitos</h1></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Aquí es donde el mapa se centra en Cuautitlán
        var map = L.map('map').setView([19.67, -99.16], 13);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Esta función "dibujará" los puntos que vengan de tu base de datos
        function agregarPunto(lat, lng, nombre) {
            L.marker([lat, lng]).addTo(map)
                .bindPopup(nombre)
                .openPopup();
        }
    </script>
</body>
</html>
