<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Logística Pro - Dark Mode</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1E1E1E;
            --primary: #0A84FF;
            --success: #30D158;
            --danger: #FF453A;
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
        }

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, sans-serif; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--card-dark); width: 100%; max-width: 360px; padding: 40px; border-radius: 28px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 16px; margin-bottom: 15px; background: #2C2C2E; border: 1px solid #3A3A3C; border-radius: 14px; color: white; box-sizing: border-box; font-size: 1rem; }

        #app-shell { display: none; height: 100%; flex-direction: column; }
        #map { flex: 1; width: 100%; background: #121212; }

        /* FILTRO MAPA OSCURO COMO TU DISEÑO */
        .leaflet-tile-container img { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* MODAL DETALLE */
        .modal { display: none; position: fixed; z-index: 2000; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-dark); margin: 10% auto; width: 90%; max-width: 420px; border-radius: 30px; overflow: hidden; border: 1px solid #333; }
        
        .info-section { background: #2C2C2E; padding: 20px; border-radius: 20px; margin: 15px; }
        .ref-alerta { color: #FF453A; font-weight: 900; font-size: 1.2rem; display: block; margin-top: 5px; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: bold; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .btn-success { background: var(--success); color: white; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #3A3A3C; color: white; }

        .floating-btn { position: absolute; bottom: 30px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .fab { width: 65px; height: 65px; border-radius: 20px; background: var(--card-dark); color: var(--primary); border: 1px solid #333; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="margin-bottom: 30px;">Logística Carlos</h1>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn btn-primary" onclick="entrar()">ENTRAR</button>
        </div>
    </div>

    <div id="app-shell">
        <div id="map"></div>
        <div class="floating-btn">
            <button class="fab" onclick="optimizar()"><i class="material-icons" style="font-size: 35px;">route</i></button>
            <button class="fab" onclick="centrar()"><i class="material-icons" style="font-size: 35px;">my_location</i></button>
        </div>

        <div id="modal-detalle" class="modal">
            <div class="modal-content" id="detalle-content"></div>
        </div>
    </div>

    <script>
        const URL = 'https://ayreitpmsaxpjsclpysg.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtbWpqY2dydWFjd2JtYmljYnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDI2NTYsImV4cCI6MjA5MTcxODY1Nn0.wIMdzc8gEycItKvPGvRmSu90kSsOxviTOgnMNIF4dJs'; // <-- REEMPLAZA ESTO
        
        const _supabase = supabase.createClient(URL, KEY);
        const db = new Dexie("CarlosLogDB");
        db.version(1).stores({ entregas: 'id, guia, estado, latitud, longitud' });

        let map, userPos, dataEntregas = [], fotoData = null;

        function entrar() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            setTimeout(iniciarMapa, 300);
        }

        function iniciarMapa() {
            if (map) return;
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([19.43, -99.13], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            trackGPS();
            descargarDatos();
        }

        async function descargarDatos() {
            const { data, error } = await _supabase.from('entregas').select('*');
            if (error) return alert("Error: " + error.message);
            
            if (data) {
                dataEntregas = data;
                await db.entregas.bulkPut(data);
                dibujarPuntos();
            }
        }

        function dibujarPuntos() {
            map.eachLayer(l => { if(l instanceof L.CircleMarker && l !== userPos) map.removeLayer(l); });
            
            dataEntregas.forEach(e => {
                // Forzamos conversión a número y limpiamos espacios
                const lat = parseFloat(String(e.latitud).trim());
                const lon = parseFloat(String(e.longitud).trim());

                if (isNaN(lat) || isNaN(lon)) return;

                const color = (e.estado || '').toLowerCase() === 'entregado' ? '#30D158' : '#0A84FF';
                const p = L.circleMarker([lat, lon], {
                    radius: 12, fillColor: color, color: "white", weight: 2, fillOpacity: 1
                }).addTo(map);
                
                p.on('click', () => mostrarDetalle(e));
            });
        }

        function mostrarDetalle(e) {
            fotoData = null;
            const content = document.getElementById('detalle-content');
            content.innerHTML = `
                <div style="padding: 25px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <h2 style="margin:0;">Guía: ${e.guia}</h2>
                        <span style="background:${e.estado === 'entregado' ? '#30D158' : '#0A84FF'}; padding:5px 12px; border-radius:10px; font-size:0.8rem; font-weight:bold;">${(e.estado || 'PENDIENTE').toUpperCase()}</span>
                    </div>

                    <div class="info-section">
                        <small style="color:var(--text-dim);">DIRECCIÓN</small>
                        <p style="margin:5px 0 15px 0;">${e.direccion || 'Sin dirección'}</p>
                        <small style="color:var(--text-dim);">REFERENCIA</small>
                        <span class="ref-alerta">${e.referencia || 'SIN REFERENCIAS'}</span>
                    </div>

                    <button class="btn btn-secondary" onclick="document.getElementById('f').click()">
                        <i class="material-icons">photo_camera</i> FOTO (OPCIONAL)
                    </button>
                    <input type="file" id="f" accept="image/*" capture="camera" style="display:none;" onchange="prev(event)">
                    <img id="img-p" style="width:100%; border-radius:15px; display:none; margin-bottom:10px;">

                    <button class="btn btn-success" onclick="marcarEntregado('${e.id}')">
                        <i class="material-icons">check_circle</i> CONFIRMAR ENTREGA
                    </button>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <button class="btn btn-primary" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${e.latitud},${e.longitud}')">MAPS</button>
                        <button class="btn btn-secondary" onclick="document.getElementById('modal-detalle').style.display='none'">CERRAR</button>
                    </div>
                </div>
            `;
            document.getElementById('modal-detalle').style.display = 'block';
        }

        function prev(e) {
            const r = new FileReader();
            r.onload = () => { fotoData = r.result; const i = document.getElementById('img-p'); i.src = r.result; i.style.display = 'block'; };
            r.readAsDataURL(e.target.files[0]);
        }

        async function marcarEntregado(id) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const upd = {
                    estado: 'entregado',
                    fecha_entrega: new Date().toISOString(),
                    latitud_confirmada: pos.coords.latitude,
                    longitud_confirmada: pos.coords.longitude,
                    foto_evidencia: fotoData
                };
                try {
                    await db.entregas.update(id, upd);
                    await _supabase.from('entregas').update(upd).eq('id', id);
                    alert("Entrega Guardada");
                    document.getElementById('modal-detalle').style.display = 'none';
                    descargarDatos();
                } catch(err) { alert("Guardado en local"); }
            });
        }

        function trackGPS() {
            navigator.geolocation.watchPosition(p => {
                const c = [p.coords.latitude, p.coords.longitude];
                if (!userPos) userPos = L.circleMarker(c, { radius: 10, fillColor: "#0A84FF", color: "white", weight: 3, fillOpacity: 1 }).addTo(map);
                else userPos.setLatLng(c);
            }, null, { enableHighAccuracy: true });
        }

        function centrar() { if (userPos) map.flyTo(userPos.getLatLng(), 16); }

        function optimizar() {
            if (!userPos) return;
            const mi = userPos.getLatLng();
            dataEntregas.sort((a,b) => {
                const da = Math.sqrt(Math.pow(a.latitud - mi.lat, 2) + Math.pow(a.longitud - mi.lng, 2));
                const db = Math.sqrt(Math.pow(b.latitud - mi.lat, 2) + Math.pow(b.longitud - mi.lng, 2));
                return da - db;
            });
            dibujarPuntos();
            alert("Ruta optimizada por cercanía");
        }
    </script>
</body>
</html>
