<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Pro - Ruta Limpia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background-color: #f0f2f5; }
        #login-screen { max-width: 350px; margin: 80px auto; padding: 25px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        #main-screen { display: none; height: 100vh; width: 100%; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; }
        .header { background: #202124; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .number-icon { background: white; border: 2px solid #1a73e8; border-radius: 50%; color: #1a73e8; font-weight: bold; text-align: center; line-height: 22px; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .btn-opt { background: #f39c12; margin-top: 5px; font-size: 11px; width: auto; padding: 5px 10px; }
        .btn-contacto { background: #25D366; color: white; font-size: 11px; display: inline-block; padding: 8px; text-decoration: none; border-radius: 5px; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h3>🚚 Logística Pro</h3>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn-entrar">INGRESAR</button>
        <p id="error-msg" style="color:red; display:none;"></p>
    </div>

    <div id="main-screen">
        <div class="header">
            <div>
                <span id="user-display" style="font-size: 12px;">Repartidor</span><br>
                <button class="btn-opt" onclick="optimizarRuta()">✨ OPTIMIZAR PENDIENTES</button>
            </div>
            <button onclick="location.reload()" style="width:auto; background:#5f6368; padding:5px 10px; margin:0;">Salir</button>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const URL_PROYECTO = 'https://dmmjjcgruacwbmbicbyg.supabase.co';
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtbWpqY2dydWFjd2JtYmljYnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDI2NTYsImV4cCI6MjA5MTcxODY1Nn0.wIMdzc8gEycItKvPGvRmSu90kSsOxviTOgnMNIF4dJs'; 
        const _supabase = supabase.createClient(URL_PROYECTO, ANON_KEY);

        let map, markersGroup, currentUid, listaPendientes = [];

        document.getElementById('btn-entrar').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                document.getElementById('error-msg').innerText = "Acceso denegado";
                document.getElementById('error-msg').style.display = 'block';
            } else {
                currentUid = data.user.id;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
                document.getElementById('user-display').innerText = email.split('@')[0];
                setTimeout(() => { initMap(); loadData(); setInterval(loadData, 20000); }, 200);
            }
        });

        function initMap() {
            if (!map) {
                map = L.map('map').setView([19.67, -99.16], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                markersGroup = L.layerGroup().addTo(map);
            }
            map.invalidateSize();
        }

        async function loadData() {
            if (!currentUid) return;
            let ayer = new Date(); ayer.setHours(ayer.getHours() - 24);
            
            const { data, error } = await _supabase
                .from('entregas')
                .select('*')
                .eq('repartidor_id', currentUid)
                .gte('creado_en', ayer.toISOString())
                .order('orden', { ascending: true });

            if (error) return;

            // FILTRO CRÍTICO: Solo guardamos y mostramos lo que NO esté entregado
            listaPendientes = data.filter(item => {
                let st = item.estado ? item.estado.replace(/["']/g, "").toLowerCase() : "pendiente";
                return st !== 'entregado';
            });

            markersGroup.clearLayers();

            listaPendientes.forEach((item, index) => {
                let st = item.estado ? item.estado.replace(/["']/g, "").toLowerCase() : "pendiente";
                let color = (st === 'ausente') ? "#f1c40f" : "#1a73e8";

                const icon = L.divIcon({
                    className: 'custom-div',
                    html: `<div class="number-icon" style="border-color:${color}; color:${color}">${item.orden || index + 1}</div>`,
                    iconSize: [26, 26]
                });

                L.marker([item.latitud, item.longitud], {icon: icon}).addTo(markersGroup)
                    .bindPopup(`
                        <b>#${item.orden || index + 1} - ${item.nombre}</b><br>
                        Status: ${st.toUpperCase()}<br><hr>
                        <a href="tel:${item.telefono}" class="btn-contacto" style="background:#3498db">📞 Llamar</a>
                        <a href="https://wa.me/${item.telefono}" target="_blank" class="btn-contacto">💬 WhatsApp</a>
                        <select onchange="updateStatus(${item.id}, this.value)" style="margin-top:5px; width:100%;">
                            <option value="">Cambiar Estado...</option>
                            <option value="entregado">✅ ENTREGADO (Quitar)</option>
                            <option value="ausente">🏠 Nadie en casa</option>
                            <option value="reintentar">🔄 Reintentar luego</option>
                        </select>
                        <br><br>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${item.latitud},${item.longitud}" target="_blank" style="color:#1a73e8; font-weight:bold;">📍 NAVEGAR</a>
                    `);
            });
        }

        async function updateStatus(rowId, newStatus) {
            if (!newStatus) return;
            const { error } = await _supabase.from('entregas').update({ estado: newStatus }).eq('id', rowId);
            if (!error) loadData(); 
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            return Math.sqrt(Math.pow(lat2 - lat1, 2) + Math.pow(lon2 - lon1, 2));
        }

        async function optimizarRuta() {
            if (listaPendientes.length === 0) return alert("No hay entregas pendientes.");
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                let latAct = pos.coords.latitude;
                let lonAct = pos.coords.longitude;
                
                let puntos = [...listaPendientes];
                let rutaOrdenada = [];
                
                while (puntos.length > 0) {
                    let masCercano = null;
                    let distMin = Infinity;
                    let indexMin = -1;

                    puntos.forEach((p, idx) => {
                        let d = calcularDistancia(latAct, lonAct, p.latitud, p.longitud);
                        if (d < distMin) {
                            distMin = d;
                            masCercano = p;
                            indexMin = idx;
                        }
                    });

                    rutaOrdenada.push(masCercano);
                    latAct = masCercano.latitud;
                    lonAct = masCercano.longitud;
                    puntos.splice(indexMin, 1);
                }

                for (let i = 0; i < rutaOrdenada.length; i++) {
                    await _supabase.from('entregas').update({ orden: i + 1 }).eq('id', rutaOrdenada[i].id);
                }
                
                alert("Ruta optimizada con los puntos restantes.");
                loadData();
            });
        }
    </script>
</body>
</html>
