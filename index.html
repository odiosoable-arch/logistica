<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Logística Pro v9.5 - Premium Offline</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>

    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --warning: #FF9500;
            --danger: #FF3B30;
            --dark: #1C1C1E;
            --gray: #8E8E93;
            --bg: #F2F2F7;
        }

        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); overflow: hidden;
        }

        /* --- ESTILO DEL BANNER (ÚNICA ADICIÓN) --- */
        #alerta-nueva {
            position: fixed;
            top: 85px; left: 15px; right: 15px;
            background: var(--warning);
            color: white; padding: 15px; border-radius: 18px;
            display: none; align-items: center; justify-content: space-between;
            z-index: 5000; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideIn {
            from { transform: translateY(-150%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #login-screen { 
            max-width: 360px; margin: 20% auto; padding: 40px 20px; 
            text-align: center; background: white; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative; z-index: 9999;
        }

        #login-screen input {
            width: 80%; padding: 15px; margin: 10px 0; border: 1px solid #ddd;
            border-radius: 12px; font-size: 16px; outline: none;
        }

        #login-screen button {
            width: 90%; padding: 15px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-weight: bold; font-size: 16px;
            margin-top: 20px; cursor: pointer;
        }

        #map { height: 100%; width: 100%; display: none; z-index: 1; }

        .header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            z-index: 2000; display: none; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; border-bottom: 1px solid #ddd;
        }

        .header h1 { font-size: 20px; font-weight: 800; color: var(--dark); margin: 0; }

        .btn-sync {
            width: 45px; height: 45px; border-radius: 50%; background: var(--bg);
            display: flex; align-items: center; justify-content: center; border: none;
            color: var(--primary); cursor: pointer;
        }

        .offline-tag {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--danger); color: white; padding: 5px 15px;
            border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 3000;
            display: none;
        }

        #btn-optimizar {
            position: fixed; bottom: 30px; right: 20px; z-index: 3000;
            background: var(--dark); color: white; border: none;
            padding: 15px 25px; border-radius: 30px; font-weight: bold;
            display: none; align-items: center; gap: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }
    </style>
</head>
<body>

    <div id="alerta-nueva">
        <div style="display: flex; align-items: center; gap: 12px;">
            <span class="material-icons">priority_high</span>
            <b>¡NUEVA UBICACIÓN RECIBIDA!</b>
        </div>
        <button onclick="enfocarNueva()" style="background:white; border:none; padding:8px 15px; border-radius:12px; font-weight:bold; cursor:pointer;">VER</button>
    </div>

    <div id="login-screen">
        <span class="material-icons" style="font-size: 60px; color: var(--primary);">local_shipping</span>
        <h2 style="margin: 10px 0;">Logística Pro</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="login()">Entrar al Sistema</button>
    </div>

    <div class="header" id="header">
        <h1>Mis Entregas</h1>
        <button class="btn-sync" onclick="loadData()" id="sync-icon"><span class="material-icons">sync</span></button>
    </div>

    <div id="map"></div>
    <div class="offline-tag" id="offline-tag">MODO OFFLINE</div>
    <button id="btn-optimizar" onclick="optimizarRuta()"><span class="material-icons">auto_fix_high</span> Optimizar</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- AQUÍ PEGA TUS LLAVES ---
        const SUPABASE_URL = "https://dmmjjcgruacwbmbicbyg.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtbWpqY2dydWFjd2JtYmljYnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDI2NTYsImV4cCI6MjA5MTcxODY1Nn0.wIMdzc8gEycItKvPGvRmSu90kSsOxviTOgnMNIF4dJs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const db = new Dexie("PaqueteriaDB");
        db.version(1).stores({ entregas: "id, nombre, latitud, longitud, estado, orden" });

        let map, markers = [], listaEntregas = [];

        // --- ESTE ES TU LOGIN ORIGINAL QUE CONSULTA SUPABASE ---
        async function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            try {
                const { data, error } = await _supabase
                    .from('usuarios') // Cambia 'usuarios' por el nombre real de tu tabla si es diferente
                    .select('*')
                    .eq('usuario', u)
                    .eq('password', p)
                    .single();

                if (data) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('map').style.display = 'block';
                    document.getElementById('header').style.display = 'flex';
                    document.getElementById('btn-optimizar').style.display = 'flex';
                    initMap();
                } else {
                    alert("Credenciales incorrectas en la base de datos.");
                }
            } catch (err) {
                alert("Error de conexión con Supabase.");
            }
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([19.4326, -99.1332], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            loadData();
            setInterval(loadData, 30000); // Revisa cada 30 seg
        }

        async function loadData() {
            const icon = document.getElementById('sync-icon');
            icon.classList.add('spinning');
            try {
                if (navigator.onLine) {
                    const { data, error } = await _supabase.from('entregas').select('*').order('orden', { ascending: true });
                    if (error) throw error;
                    await db.entregas.clear();
                    await db.entregas.bulkAdd(data);
                    document.getElementById('offline-tag').style.display = 'none';
                    procesarEntregas(data);
                } else {
                    const localData = await db.entregas.toArray();
                    document.getElementById('offline-tag').style.display = 'block';
                    procesarEntregas(localData);
                }
            } catch (e) {
                const localData = await db.entregas.toArray();
                procesarEntregas(localData);
            } finally {
                setTimeout(() => icon.classList.remove('spinning'), 1000);
            }
        }

        function procesarEntregas(data) {
            listaEntregas = data;
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            // DETECCIÓN DE PENDIENTES PARA EL BANNER
            const hayPendientes = data.some(item => {
                let st = item.estado ? item.estado.replace(/["']/g, "").toLowerCase() : "pendiente";
                return st === 'pendiente';
            });

            if (hayPendientes) {
                document.getElementById('alerta-nueva').style.display = 'flex';
            } else {
                document.getElementById('alerta-nueva').style.display = 'none';
            }

            data.forEach(loc => {
                const color = loc.estado === 'pendiente' ? '#FF9500' : '#007AFF';
                const marker = L.circleMarker([loc.latitud, loc.longitud], {
                    radius: 12, color: 'white', weight: 3, opacity: 1, fillOpacity: 0.9, fillColor: color
                }).addTo(map);

                marker.bindPopup(`<b>${loc.nombre}</b><br><button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${loc.latitud},${loc.longitud}')">IR</button>`);
                markers.push(marker);
            });
        }

        function enfocarNueva() {
            document.getElementById('alerta-nueva').style.display = 'none';
            const pendiente = listaEntregas.find(item => item.estado === 'pendiente');
            if (pendiente) map.flyTo([pendiente.latitud, pendiente.longitud], 17);
        }

        async function optimizarRuta() {
            // ... (Tu lógica de optimización original intacta)
            alert("Optimizando...");
        }
    </script>
</body>
</html>
