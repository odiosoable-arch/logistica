<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Logística Pro v10.0 - Dark Mode & GPS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script> 
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #0A84FF;
            --success: #30D158;
            --danger: #FF453A;
            --bg-dark: #121212;
            --card-dark: #1C1C1E;
        }

        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark); color: white; overflow: hidden;
        }

        /* FILTRO MAPA OSCURO (EL QUE TE GUSTÓ) */
        .leaflet-tile-container img { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        #login-screen { 
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card { background: var(--card-dark); padding: 40px; border-radius: 28px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 14px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; font-size: 1rem; }

        #app-shell { display: none; height: 100%; flex-direction: column; }
        #map { flex: 1; width: 100%; background: #121212; }

        .modal { display: none; position: fixed; z-index: 2000; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-dark); margin: 10% auto; width: 90%; max-width: 420px; border-radius: 30px; overflow: hidden; border: 1px solid #333; }
        
        .info-box { background: #2c2c2e; padding: 20px; border-radius: 20px; margin: 15px; }
        .ref-texto { color: var(--danger); font-weight: 900; font-size: 1.3rem; display: block; margin-top: 5px; line-height: 1.2; }
        
        .btn-base { width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; font-size: 1rem; }
        
        .floating-btns { position: absolute; bottom: 35px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .fab { width: 65px; height: 65px; border-radius: 20px; background: var(--card-dark); color: var(--primary); border: 1px solid #333; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="margin-bottom: 30px;">Logística Carlos</h1>
            <input type="text" id="user-email" placeholder="Usuario">
            <input type="password" id="user-pass" placeholder="Contraseña">
            <button onclick="login()" class="btn-base" style="background: var(--primary); color: white;">INGRESAR</button>
        </div>
    </div>

    <div id="app-shell">
        <div id="map"></div>
        <div class="floating-btns">
            <button class="fab" onclick="optimizarRuta()"><i class="material-icons" style="font-size: 35px;">directions_run</i></button>
            <button class="fab" onclick="centrarEnMi()"><i class="material-icons" style="font-size: 35px;">my_location</i></button>
        </div>
        <div id="modal-detalle" class="modal">
            <div class="modal-content" id="entrega-detalle"></div>
        </div>
    </div>

    <script>
        // --- TUS CREDENCIALES PRESERVADAS ---
        const SUPABASE_URL = 'https://ayreitpmsaxpjsclpysg.supabase.co';
        const SUPABASE_KEY = 'TU_KEY_QUE_ESTABA_EN_INDEX_2'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const db = new Dexie("LogisticaDB");
        db.version(1).stores({ entregas: 'id, guia, estado, latitud, longitud' });

        let map, userMarker, listaEntregas = [], fotoBase64 = null;

        function login() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            setTimeout(initMap, 200);
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([19.4326, -99.1332], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            seguirRepartidor();
            loadData();
        }

        async function loadData() {
            const { data, error } = await _supabase.from('entregas').select('*');
            if (data) {
                listaEntregas = data;
                await db.entregas.bulkPut(data);
                renderMarkers();
            }
        }

        function renderMarkers() {
            map.eachLayer(l => { if(l instanceof L.CircleMarker && l !== userMarker) map.removeLayer(l); });
            listaEntregas.forEach(e => {
                const lat = parseFloat(e.latitud);
                const lon = parseFloat(e.longitud);
                if (isNaN(lat) || isNaN(lon)) return;

                const color = (e.estado || '').toLowerCase() === 'entregado' ? '#30D158' : '#0A84FF';
                L.circleMarker([lat, lon], { radius: 12, fillColor: color, color: "white", weight: 2, fillOpacity: 1 })
                 .addTo(map).on('click', () => renderEntregaDetalle(e));
            });
        }

        function renderEntregaDetalle(e) {
            fotoBase64 = null;
            const det = document.getElementById('entrega-detalle');
            det.innerHTML = `
                <div style="padding: 25px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <h2 style="margin:0;">Guía: ${e.guia}</h2>
                        <span style="background:${e.estado === 'entregado' ? '#30D158' : '#0A84FF'}; padding:6px 14px; border-radius:12px; font-size:0.8rem; font-weight:bold;">${(e.estado || 'PENDIENTE').toUpperCase()}</span>
                    </div>
                    <div class="info-box">
                        <small style="color:#A0A0A0;">DIRECCIÓN</small>
                        <p style="margin:5px 0 15px 0; font-size:0.95rem;">${e.direccion}</p>
                        <small style="color:#A0A0A0;">REFERENCIA</small>
                        <span class="ref-texto">${e.referencia || 'SIN REFERENCIAS'}</span>
                    </div>
                    <button class="btn-base" style="background:#3a3a3c; color:white;" onclick="document.getElementById('f').click()">
                        <i class="material-icons">photo_camera</i> FOTO (OPCIONAL)
                    </button>
                    <input type="file" id="f" accept="image/*" capture="camera" style="display:none" onchange="preview(event)">
                    <img id="p-img" style="width:100%; border-radius:20px; display:none; margin-bottom:15px;">
                    
                    <button class="btn-base" style="background:var(--success); color:white;" onclick="confirmar('${e.id}')">
                        <i class="material-icons">check_circle</i> CONFIRMAR ENTREGA
                    </button>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <button class="btn-base" style="background:var(--primary); color:white;" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${e.latitud},${e.longitud}')">NAVEGAR</button>
                        <button class="btn-base" style="background:#3a3a3c; color:white;" onclick="document.getElementById('modal-detalle').style.display='none'">CERRAR</button>
                    </div>
                </div>
            `;
            document.getElementById('modal-detalle').style.display = 'block';
        }

        function preview(e) {
            const r = new FileReader();
            r.onload = () => { fotoBase64 = r.result; const i = document.getElementById('p-img'); i.src = r.result; i.style.display = 'block'; };
            r.readAsDataURL(e.target.files[0]);
        }

        async function confirmar(id) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const upd = {
                    estado: 'entregado',
                    fecha_entrega: new Date().toISOString(),
                    latitud_confirmada: pos.coords.latitude,
                    longitud_confirmada: pos.coords.longitude,
                    foto_evidencia: fotoBase64
                };
                await db.entregas.update(id, upd);
                await _supabase.from('entregas').update(upd).eq('id', id);
                alert("Entrega Guardada");
                document.getElementById('modal-detalle').style.display = 'none';
                loadData();
            }, () => alert("GPS Necesario"), { enableHighAccuracy: true });
        }

        function seguirRepartidor() {
            navigator.geolocation.watchPosition(p => {
                const c = [p.coords.latitude, p.coords.longitude];
                if (!userMarker) userMarker = L.circleMarker(c, { radius: 10, fillColor: "#0A84FF", color: "white", weight: 3, fillOpacity: 1 }).addTo(map);
                else userMarker.setLatLng(c);
            }, null, { enableHighAccuracy: true });
        }

        function centrarEnMi() { if (userMarker) map.flyTo(userMarker.getLatLng(), 16); }

        function optimizarRuta() {
            if (!userMarker) return;
            const mi = userMarker.getLatLng();
            listaEntregas.sort((a,b) => {
                const da = Math.sqrt(Math.pow(a.latitud - mi.lat, 2) + Math.pow(a.longitud - mi.lng, 2));
                const db = Math.sqrt(Math.pow(b.latitud - mi.lat, 2) + Math.pow(b.longitud - mi.lng, 2));
                return da - db;
            });
            renderMarkers();
            alert("Ruta optimizada");
        }
    </script>
</body>
</html>
