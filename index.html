<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Pro - Cuautitlán</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background-color: #f0f2f5; }
        #login-screen { max-width: 350px; margin: 80px auto; padding: 25px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #main-screen { display: none; height: 100vh; width: 100%; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; }
        .header { background: #202124; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .number-icon { background: white; border: 2px solid #1a73e8; border-radius: 50%; color: #1a73e8; font-weight: bold; text-align: center; line-height: 22px; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .btn-contacto { background: #25D366; color: white; font-size: 11px; display: inline-block; padding: 8px; text-decoration: none; border-radius: 5px; margin-right: 5px; }
        .btn-tel { background: #3498db; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h3>🚚 Panel de Entrega</h3>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn-entrar">INGRESAR</button>
        <p id="error-msg" style="color:red; display:none;"></p>
    </div>

    <div id="main-screen">
        <div class="header">
            <span id="user-display">Repartidor</span>
            <button onclick="location.reload()" style="width:auto; background:#5f6368; margin:0; padding:5px 10px;">Salir</button>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const URL_PROYECTO = 'https://dmmjjcgruacwbmbicbyg.supabase.co';
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtbWpqY2dydWFjd2JtYmljYnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDI2NTYsImV4cCI6MjA5MTcxODY1Nn0.wIMdzc8gEycItKvPGvRmSu90kSsOxviTOgnMNIF4dJs'; 
        const _supabase = supabase.createClient(URL_PROYECTO, ANON_KEY);

        let map, markersGroup, currentUid;

        document.getElementById('btn-entrar').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                document.getElementById('error-msg').innerText = "Acceso incorrecto";
                document.getElementById('error-msg').style.display = 'block';
            } else {
                currentUid = data.user.id;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
                document.getElementById('user-display').innerText = email.split('@')[0];
                
                setTimeout(() => { 
                    initMap(); 
                    loadData(); // Carga inicial
                    // REFRESCADO AUTOMÁTICO CADA 15 SEGUNDOS
                    setInterval(loadData, 15000); 
                }, 200);
            }
        });

        function initMap() {
            if (!map) {
                map = L.map('map').setView([19.67, -99.16], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                markersGroup = L.layerGroup().addTo(map);
            }
            map.invalidateSize();
        }

        async function loadData() {
            if (!currentUid) return;
            console.log("Revisando nuevas entregas...");

            // Filtro de fecha simplificado: Solo lo de las últimas 24 horas
            let ayer = new Date();
            ayer.setHours(ayer.getHours() - 24);
            
            const { data, error } = await _supabase
                .from('entregas')
                .select('*')
                .eq('repartidor_id', currentUid)
                .gte('creado_en', ayer.toISOString())
                .order('orden', { ascending: true });

            if (error) { console.error(error); return; }

            markersGroup.clearLayers();

            data.forEach((item, index) => {
                // Limpiar comillas por si Make las envía
                let st = item.estado ? item.estado.replace(/["']/g, "").toLowerCase() : "pendiente";

                let color = "#3498db"; 
                if (st === 'entregado') color = "#2ecc71";
                if (st === 'ausente') color = "#f1c40f";
                if (st === 'reintentar') color = "#9b59b6";
                if (st === 'no_reintentar' || st === 'perdido') color = "#e74c3c";

                const icon = L.divIcon({
                    className: 'custom-div',
                    html: `<div class="number-icon" style="border-color:${color}; color:${color}">${item.orden || index + 1}</div>`,
                    iconSize: [26, 26]
                });

                L.marker([item.latitud, item.longitud], {icon: icon}).addTo(markersGroup)
                    .bindPopup(`
                        <div style="min-width:150px;">
                            <b>#${item.orden || index + 1} - ${item.nombre}</b><br>
                            Estado: <b>${st.toUpperCase()}</b><br><hr>
                            <a href="tel:${item.telefono}" class="btn-contacto btn-tel">📞 Llamar</a>
                            <a href="https://wa.me/${item.telefono}" target="_blank" class="btn-contacto">💬 WhatsApp</a>
                            <div style="margin-top:10px;">
                                <select onchange="updateStatus(${item.id}, this.value)">
                                    <option value="">Cambiar Estado...</option>
                                    <option value="entregado">✅ Entregado</option>
                                    <option value="reintentar">🔄 Reintentar</option>
                                    <option value="ausente">🏠 Nadie en casa</option>
                                    <option value="no_reintentar">⛔ No reintentar</option>
                                </select>
                            </div>
                            <br>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${item.latitud},${item.longitud}" target="_blank" style="color:#1a73e8; font-weight:bold;">🚀 INICIAR NAVEGACIÓN</a>
                        </div>
                    `);
            });
        }

        async function updateStatus(rowId, newStatus) {
            if (!newStatus) return;
            const { error } = await _supabase.from('entregas').update({ estado: newStatus }).eq('id', rowId);
            if (!error) loadData(); 
        }
    </script>
</body>
</html>
