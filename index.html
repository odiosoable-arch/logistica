<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Logística Pro v6.0 - Diseño Premium</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f7f9fc;
            --primary-color: #2196F3;
            --success-color: #4CAF50;
            --warning-color: #FFC107;
            --danger-color: #f44336;
            --text-color: #333;
            --header-bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        html, body { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* --- Pantalla de Login Rediseñada --- */
        #login-screen { 
            max-width: 380px; 
            margin: 10% auto; 
            padding: 40px 30px; 
            background: var(--card-bg); 
            border-radius: 20px; 
            box-shadow: var(--shadow); 
            text-align: center; 
        }

        #login-screen h2 { margin-bottom: 30px; color: var(--primary-color); }
        #login-screen input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            border: 1px solid #ddd; border-radius: 12px; 
            box-sizing: border-box; font-size: 16px;
        }
        #login-screen button { 
            width: 100%; padding: 15px; 
            background: var(--primary-color); color: white; 
            border: none; border-radius: 12px; 
            font-weight: bold; font-size: 16px; cursor: pointer;
        }

        /* --- Pantalla Principal Rediseñada --- */
        #main-screen { display: none; height: 100vh; width: 100%; flex-direction: column; }

        .header { 
            background: var(--header-bg); 
            padding: 10px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            z-index: 1000;
        }

        .header-info span { font-size: 12px; color: #888; }
        
        .btn-opt { 
            background: var(--warning-color); color: #333; 
            border: none; border-radius: 20px; padding: 8px 16px; 
            font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 5px; margin-top: 5px;
        }

        .btn-salir { 
            background: #f0f0f0; color: #555; 
            border: none; border-radius: 12px; padding: 8px 12px; 
            font-weight: bold; font-size: 13px;
        }

        #map { flex-grow: 1; width: 100%; }

        /* --- Diseño de Iconos Numerados --- */
        .number-icon-premium { 
            background: white; border: 3px solid; border-radius: 50%; 
            color: #333; font-weight: bold; text-align: center; 
            line-height: 28px; font-size: 14px; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.2); 
            width: 28px; height: 28px;
        }

        /* --- Diseño del Popup PREMIUM (Carlos 😎) --- */
        .premium-popup { min-width: 260px; font-family: sans-serif; padding: 10px 0; }
        
        .premium-popup-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px;
        }
        
        .premium-popup-header h3 { margin: 0; font-size: 16px; color: #333; }
        .premium-popup-header span { font-size: 11px; color: #888; }

        .contact-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-contact-action { 
            flex: 1; text-align: center; text-decoration: none; 
            padding: 14px; border-radius: 12px; 
            color: white; font-weight: bold; font-size: 14px; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        
        .btn-tel-premium { background-color: var(--primary-color); }
        .btn-wa-premium { background-color: var(--success-color); }

        .status-select-premium { 
            width: 100%; padding: 14px; border-radius: 12px; 
            border: 1px solid #ccc; background: #fff; 
            font-size: 14px; margin-bottom: 15px; 
            appearance: none; -webkit-appearance: none;
        }

        .btn-nav-premium { 
            display: block; width: 100%; text-align: center; 
            background: #eee; color: #333; 
            padding: 14px; border-radius: 12px; 
            text-decoration: none; font-weight: bold; font-size: 15px; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

    </style>
</head>
<body>

    <div id="login-screen">
        <h2>🚚 Logística Pro</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn-entrar">INGRESAR AL MAPA</button>
        <p id="error-msg" style="color:red; display:none; margin-top:15px; font-size:13px;"></p>
    </div>

    <div id="main-screen">
        <div class="header">
            <div class="header-info">
                <span id="user-display">carlos.salazarmtz@hotmail.com</span><br>
                <button class="btn-opt" onclick="optimizarRuta()">
                    <span class="material-icons" style="font-size: 16px;">bolt</span> ✨ OPTIMIZAR RUTA
                </button>
            </div>
            <button class="btn-salir" onclick="location.reload()">Salir</button>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const URL_PROYECTO = 'https://dmmjjcgruacwbmbicbyg.supabase.co';
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtbWpqY2dydWFjd2JtYmljYnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDI2NTYsImV4cCI6MjA5MTcxODY1Nn0.wIMdzc8gEycItKvPGvRmSu90kSsOxviTOgnMNIF4dJs'; 
        const _supabase = supabase.createClient(URL_PROYECTO, ANON_KEY);

        let map, markersGroup, userMarker, currentUid, currentEmail, listaEntregas = [];

        // --- MANEJO DE SESIÓN ---
        document.getElementById('btn-entrar').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                document.getElementById('error-msg').innerText = "Acceso denegado: " + error.message;
                document.getElementById('error-msg').style.display = 'block';
            } else {
                currentUid = data.user.id; currentEmail = email;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
                document.getElementById('user-display').innerText = email;
                setTimeout(() => { initMap(); loadData(); seguirRepartidor(); setInterval(loadData, 20000); }, 200);
            }
        });

        function initMap() {
            if (!map) {
                map = L.map('map').setView([19.67, -99.16], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                markersGroup = L.layerGroup().addTo(map);
            }
            map.invalidateSize();
        }

        function seguirRepartidor() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(async (pos) => {
                    const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                    if (!userMarker) {
                        userMarker = L.circleMarker([lat, lon], { radius: 10, fillColor: "#2196F3", color: "white", weight: 3, opacity: 1, fillOpacity: 0.9 }).addTo(map);
                    } else { userMarker.setLatLng([lat, lon]); }
                    if (currentUid) { await _supabase.from('perfiles_repartidores').upsert({ id: currentUid, email: currentEmail, latitud: lat, longitud: lon, ultima_conexion: new Date().toISOString() }); }
                }, null, { enableHighAccuracy: true });
            }
        }

        // Función limpiadora de teléfono ( Fix para #83181 y #83182 )
        function getWAUrl(tel) {
            if(!tel) return "#";
            let clean = tel.toString().replace(/\D/g, ''); // Solo números
            // Arreglo para números que vienen con 521 (de WhatsApp Make)
            if (clean.startsWith("521") && clean.length > 11) { clean = "52" + clean.substring(3); }
            return `https://api.whatsapp.com/send?phone=${clean}`;
        }
        function getTelUrl(tel) {
            if(!tel) return "#";
            let clean = tel.toString().replace(/\D/g, ''); // Solo números
            // Para llamadas, si viene con 521, quitamos el 521 para que sea local
            if (clean.startsWith("521") && clean.length > 11) { clean = clean.substring(3); }
            return `tel:${clean}`;
        }

        // --- CARGA DE DATOS Y NUEVO POPUP ---
        async function loadData() {
            if (!currentUid) return;
            let ayer = new Date(); ayer.setHours(ayer.getHours() - 24);
            const { data } = await _supabase.from('entregas').select('*').eq('repartidor_id', currentUid).gte('creado_en', ayer.toISOString()).order('orden', { ascending: true });
            if (!data) return;
            listaEntregas = data;
            markersGroup.clearLayers();

            data.forEach((item, index) => {
                let st = item.estado ? item.estado.replace(/["']/g, "").toLowerCase() : "pendiente";
                if (st === 'entregado') return; // Desaparece si está entregado

                // COLORES E ICONOS DE INVENTARIO
                let color = "#1a73e8"; // Azul - Pendiente
                let etiqueta = item.orden || index + 1;

                if (st === 'ausente' || st === 'nadie en casa') color = "#FFC107"; // Amarillo - Nadie en casa
                if (st === 'reintentar') color = "#9b59b6"; // Morado - Reintentar
                if (st === 'perdido' || st === 'no_reintentar' || st === 'cancelado') { color = "#e74c3c"; etiqueta = "⚠️"; }

                const icon = L.divIcon({ className: 'custom', html: `<div class="number-icon-premium" style="border-color:${color}; color:${color}">${etiqueta}</div>`, iconSize: [32, 32] });
                
                L.marker([item.latitud, item.longitud], {icon: icon}).addTo(markersGroup)
                    .bindPopup(`
                        <div class="premium-popup">
                            <div class="premium-popup-header">
                                <h3>#${item.orden || index + 1} - ${item.nombre || 'Carlos Salazar'}</h3>
                                <span>$0</span>
                            </div>
                            
                            <div class="contact-group">
                                <a href="${getTelUrl(item.telefono)}" class="btn-contact-action btn-tel-premium">
                                    <span class="material-icons">call</span> Llamar
                                </a>
                                <a href="${getWAUrl(item.telefono)}" target="_blank" class="btn-contact-action btn-wa-premium">
                                    <span class="material-icons">chat</span> WA
                                </a>
                            </div>

                            <select onchange="updateStatus(${item.id}, this.value)" class="status-select-premium">
                                <option value="">⚙️ Estatus: ${st.toUpperCase()}...</option>
                                <option value="entregado">✅ Entregado</option>
                                <option value="reintentar">🔄 Reintentar</option>
                                <option value="ausente">🏠 Nadie en casa</option>
                                <option value="no_reintentar">⛔ Cancelado</option>
                                <option value="perdido">❌ Paquete Perdido</option>
                            </select>

                            <a href="https://www.google.com/maps/dir/?api=1&destination=${item.latitud},${item.longitud}" target="_blank" class="btn-nav-premium">
                                <span class="material-icons">navigation</span> INICIAR GPS
                            </a>
                        </div>
                    `);
            });
        }

        async function updateStatus(rowId, newStatus) {
            if (!newStatus) return;
            await _supabase.from('entregas').update({ estado: newStatus }).eq('id', rowId);
            loadData();
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) { return Math.sqrt(Math.pow(lat2 - lat1, 2) + Math.pow(lon2 - lon1, 2)); }

        async function optimizarRuta() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                let latAct = pos.coords.latitude; let lonAct = pos.coords.longitude;
                let activos = listaEntregas.filter(e => { let s = e.estado ? e.estado.toLowerCase() : "pendiente"; return s === 'pendiente' || s === 'reintentar'; });
                if (activos.length === 0) return alert("Nada que optimizar.");
                let rutaOrdenada = [];
                while (activos.length > 0) {
                    let masCercano = null, distMin = Infinity, indexMin = -1;
                    activos.forEach((p, idx) => { let d = calcularDistancia(latAct, lonAct, p.latitud, p.longitud); if (d < distMin) { distMin = d; masCercano = p; indexMin = idx; } });
                    rutaOrdenada.push(masCercano); latAct = masCercano.latitud; lonAct = masCercano.longitud; activos.splice(indexMin, 1);
                }
                for (let i = 0; i < rutaOrdenada.length; i++) { await _supabase.from('entregas').update({ orden: i + 1 }).eq('id', rutaOrdenada[i].id); }
                loadData();
            });
        }
    </script>
</body>
</html>
