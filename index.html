<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Logística Carlos v45.0 - Light Gray Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { 
            --primary: #007AFF; 
            --success: #34C759; 
            --danger: #FF3B30; 
            --gray: #8E8E93; 
            --light-gray: #E5E5EA;
        }
        
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, sans-serif; background: #F2F2F7; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: #F2F2F7; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 350px; text-align: center; background: white; padding: 35px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        #app-shell { display: none; height: 100%; flex-direction: column; position: relative; }
        #map { flex: 1; width: 100%; background: #D1D1D6; } 

        /* MAPA GRIS CLARO */
        .leaflet-tile { filter: grayscale(1) contrast(1.1) brightness(1.1); }

        .modal { display: none; position: fixed; z-index: 2000; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 8% auto; width: 92%; max-width: 440px; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        
        .status-badge { padding: 5px 14px; border-radius: 14px; font-size: 0.75rem; font-weight: bold; color: white; text-transform: uppercase; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; font-size: 1rem; transition: 0.2s; }
        .btn-action:active { transform: scale(0.98); }
        
        .floating-controls { position: absolute; bottom: 35px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 18px; }
        .fab { width: 62px; height: 62px; border-radius: 31px; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border: none; color: var(--primary); cursor: pointer; }
        
        .info-card { background: #F2F2F7; padding: 18px; border-radius: 18px; margin-bottom: 20px; border-left: 6px solid var(--primary); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="margin-bottom: 30px; font-weight: 800;">Logística Carlos</h2>
            <input type="text" id="user-email" placeholder="Usuario" style="width:100%; padding:16px; margin-bottom:15px; border:1px solid #D1D1D6; border-radius:14px; box-sizing: border-box; font-size: 1rem;">
            <input type="password" id="user-pass" placeholder="Contraseña" style="width:100%; padding:16px; margin-bottom:35px; border:1px solid #D1D1D6; border-radius:14px; box-sizing: border-box; font-size: 1rem;">
            <button onclick="acceder()" style="width:100%; background: var(--primary); color:white; padding:18px; border:none; border-radius:16px; font-weight:bold; font-size:1.1rem;">INGRESAR</button>
        </div>
    </div>

    <div id="app-shell">
        <div id="map"></div>
        
        <div class="floating-controls">
            <button class="fab" onclick="optimizarRuta()"><i class="material-icons" style="font-size:32px;">directions_run</i></button>
            <button class="fab" onclick="centrarEnMi()"><i class="material-icons" style="font-size:32px;">my_location</i></button>
        </div>

        <div id="modal-detalle" class="modal">
            <div class="modal-content" id="entrega-detalle"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const SUPABASE_URL = 'https://ayreitpmsaxpjsclpysg.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtbWpqY2dydWFjd2JtYmljYnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDI2NTYsImV4cCI6MjA5MTcxODY1Nn0.wIMdzc8gEycItKvPGvRmSu90kSsOxviTOgnMNIF4dJs'; // <-- DEBES CAMBIAR ESTO
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const db = new Dexie("LogisticaCarlosDB");
        db.version(1).stores({ entregas: 'id, guia, estado, latitud, longitud' });

        let map, userMarker, listaEntregas = [], fotoBase64 = null;

        function acceder() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            setTimeout(initMap, 300);
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([19.4326, -99.1332], 12);
            
            // MAPA GRIS CLARO
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            seguirRepartidor();
            cargarDatos();
        }

        async function cargarDatos() {
            try {
                const { data, error } = await _supabase.from('entregas').select('*');
                if (error) {
                    alert("Error Supabase: " + error.message);
                    throw error;
                }
                if (data && data.length > 0) {
                    listaEntregas = data;
                    await db.entregas.bulkPut(data);
                    dibujarPuntos();
                } else {
                    console.log("No hay datos en la tabla 'entregas'");
                }
            } catch (e) {
                listaEntregas = await db.entregas.toArray();
                if(listaEntregas.length > 0) dibujarPuntos();
            }
        }

        function dibujarPuntos() {
            // Limpiar marcadores existentes
            map.eachLayer(l => { if(l instanceof L.CircleMarker && l !== userMarker) map.removeLayer(l); });
            
            listaEntregas.forEach(e => {
                const lat = parseFloat(e.latitud);
                const lon = parseFloat(e.longitud);
                if (isNaN(lat) || isNaN(lon)) return;

                const color = (e.estado || '').toLowerCase() === 'entregado' ? '#34C759' : '#007AFF';
                const marker = L.circleMarker([lat, lon], {
                    radius: 11, fillColor: color, color: "white", weight: 3, fillOpacity: 1
                }).addTo(map);
                
                marker.on('click', () => verDetalle(e));
            });
            
            // Auto-ajustar mapa para ver todos los puntos
            const coords = listaEntregas.filter(e => e.latitud).map(e => [e.latitud, e.longitud]);
            if (coords.length > 0) map.fitBounds(coords, { padding: [50, 50] });
        }

        function verDetalle(entrega) {
            const container = document.getElementById('entrega-detalle');
            fotoBase64 = null;
            const colorEstado = { 'pendiente': '#007AFF', 'entregado': '#34C759', 'cancelado': '#FF3B30' };

            container.innerHTML = `
                <div style="padding: 25px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h3 style="margin:0; font-size:1.3rem;">Guía: ${entrega.guia || '---'}</h3>
                        <span class="status-badge" style="background:${colorEstado[(entrega.estado || 'pendiente').toLowerCase()] || '#8E8E93'}">
                            ${(entrega.estado || 'PENDIENTE').toUpperCase()}
                        </span>
                    </div>

                    <div class="info-card">
                        <p style="margin:0 0 10px 0; font-size:0.95rem;"><strong>📍 DIRECCIÓN:</strong><br>${entrega.direccion || 'Sin dirección'}</p>
                        <p style="margin:0;"><strong>📝 REFERENCIA:</strong><br>
                            <span style="color:var(--danger); font-weight:800; font-size:1.1rem;">${entrega.referencia || 'SIN REFERENCIAS'}</span>
                        </p>
                    </div>

                    <button class="btn-action" style="background:var(--light-gray); color:black;" onclick="document.getElementById('input-foto').click()">
                        <i class="material-icons">photo_camera</i> EVIDENCIA (OPCIONAL)
                    </button>
                    <input type="file" id="input-foto" accept="image/*" capture="camera" style="display:none;" onchange="preview(event)">
                    <img id="preview-img" style="width:100%; border-radius:18px; display:none; margin-bottom:15px; border:1px solid #ddd;">

                    <button class="btn-action" style="background:var(--success); color:white;" onclick="entregar('${entrega.id}')">
                        <i class="material-icons">check_circle</i> CONFIRMAR ENTREGA
                    </button>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <button class="btn-action" style="background:var(--primary); color:white;" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${entrega.latitud},${entrega.longitud}')">NAVEGAR</button>
                        <button class="btn-action" style="background:var(--gray); color:white;" onclick="document.getElementById('modal-detalle').style.display='none'">CERRAR</button>
                    </div>
                </div>
            `;
            document.getElementById('modal-detalle').style.display = 'block';
        }

        function preview(e) {
            const reader = new FileReader();
            reader.onload = () => {
                fotoBase64 = reader.result;
                const img = document.getElementById('preview-img');
                img.src = fotoBase64; img.style.display = 'block';
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        }

        async function entregar(id) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const data = {
                    estado: 'entregado',
                    fecha_entrega: new Date().toISOString(),
                    latitud_confirmada: pos.coords.latitude,
                    longitud_confirmada: pos.coords.longitude,
                    foto_evidencia: fotoBase64
                };
                try {
                    await db.entregas.update(id, data);
                    await _supabase.from('entregas').update(data).eq('id', id);
                    alert("Entrega guardada.");
                    document.getElementById('modal-detalle').style.display = 'none';
                    cargarDatos();
                } catch (err) { alert("Sin red. Guardado en teléfono."); }
            }, () => alert("GPS obligatorio para entregar."), { enableHighAccuracy: true });
        }

        function seguirRepartidor() {
            navigator.geolocation.watchPosition(pos => {
                const c = [pos.coords.latitude, pos.coords.longitude];
                if (!userMarker) userMarker = L.circleMarker(c, { radius: 10, fillColor: "#007AFF", color: "white", weight: 3, fillOpacity: 1 }).addTo(map);
                else userMarker.setLatLng(c);
            }, null, { enableHighAccuracy: true });
        }

        function centrarEnMi() { if (userMarker) map.flyTo(userMarker.getLatLng(), 16); }

        function optimizarRuta() {
            if (!userMarker || listaEntregas.length === 0) return alert("Buscando GPS...");
            const miPos = userMarker.getLatLng();
            listaEntregas.sort((a, b) => {
                const dA = Math.sqrt(Math.pow(a.latitud - miPos.lat, 2) + Math.pow(a.longitud - miPos.lng, 2));
                const dB = Math.sqrt(Math.pow(b.latitud - miPos.lat, 2) + Math.pow(b.longitud - miPos.lng, 2));
                return dA - dB;
            });
            dibujarPuntos();
            alert("Ordenado por cercanía.");
        }
    </script>
</body>
</html>
